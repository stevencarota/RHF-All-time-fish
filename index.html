<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RHF Fishing Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --water: #1a6b8a; --water-light: #e8f4f8; --water-mid: #4a9ab8; --water-dark: #0d4a62;
  --amber: #e8943a; --green: #3a8c5c; --coral: #d85a30;
  --bg: #f5f7f9; --card: #ffffff; --border: rgba(0,0,0,0.08);
  --text: #1a1f2e; --muted: #6b7280;
  --font-display: 'Playfair Display', serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
}
@media (prefers-color-scheme: dark) {
  :root { --bg: #111827; --card: #1f2937; --border: rgba(255,255,255,0.08); --text: #f3f4f6; --muted: #9ca3af; }
}
body { background: var(--bg); font-family: var(--font-body); color: var(--text); }
.dash-header { background: var(--water-dark); padding: 1.25rem 1.5rem 1rem; display: flex; align-items: flex-end; gap: 1rem; justify-content: space-between; margin-bottom: 1.25rem; }
.dash-title { font-family: var(--font-display); font-size: 22px; color: #fff; line-height: 1.1; }
.dash-subtitle { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; font-family: var(--font-mono); letter-spacing: 0.05em; }
.filter-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; padding: 0 1.5rem 1rem; }
.filter-bar label { font-size: 12px; color: var(--muted); font-family: var(--font-mono); margin-right: 2px; }
.filter-bar select { font-size: 13px; padding: 5px 10px; border-radius: 6px; border: 0.5px solid var(--border); background: var(--card); color: var(--text); font-family: var(--font-body); cursor: pointer; }
.pill-group { display: flex; gap: 4px; flex-wrap: wrap; }
.pill { font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--muted); cursor: pointer; font-family: var(--font-mono); transition: all 0.15s; }
.pill.active { background: var(--water); color: #fff; border-color: var(--water); }
.pill:hover:not(.active) { border-color: var(--water); color: var(--water); }
.metrics-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; padding: 0 1.5rem 1rem; }
.metric-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 10px; padding: 0.875rem 1rem; border-top: 3px solid transparent; }
.metric-card.blue { border-top-color: var(--water); }
.metric-card.amber { border-top-color: var(--amber); }
.metric-card.green { border-top-color: var(--green); }
.metric-card.coral { border-top-color: var(--coral); }
.metric-label { font-size: 11px; color: var(--muted); font-family: var(--font-mono); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 4px; }
.metric-value { font-size: 26px; font-weight: 700; font-family: var(--font-display); line-height: 1.1; }
.metric-card.blue .metric-value { color: var(--water); }
.metric-card.amber .metric-value { color: var(--amber); }
.metric-card.green .metric-value { color: var(--green); }
.metric-card.coral .metric-value { color: var(--coral); }
.metric-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 1.5rem 10px; }
.charts-row-3 { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; padding: 0 1.5rem 10px; }
.chart-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 10px; padding: 1rem 1.25rem; }
.chart-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 0.75rem; font-family: var(--font-mono); letter-spacing: 0.03em; display: flex; justify-content: space-between; align-items: center; }
.chart-title span { font-size: 11px; color: var(--muted); font-weight: 400; }
.slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 0.75rem; flex-wrap: wrap; }
.slider-row label { font-size: 11px; color: var(--muted); font-family: var(--font-mono); white-space: nowrap; }
.slider-row input[type=range] { flex: 1; min-width: 80px; }
.slider-val { font-size: 12px; font-weight: 500; color: var(--water); font-family: var(--font-mono); min-width: 36px; }
.leaderboard { width: 100%; border-collapse: collapse; }
.leaderboard th { font-size: 11px; color: var(--muted); font-family: var(--font-mono); text-align: left; padding: 4px 8px 8px; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 0.5px solid var(--border); }
.leaderboard td { font-size: 13px; padding: 6px 8px; border-bottom: 0.5px solid var(--border); color: var(--text); }
.leaderboard tr:last-child td { border-bottom: none; }
.rank-badge { display: inline-flex; width: 20px; height: 20px; border-radius: 50%; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; font-family: var(--font-mono); }
.rank-1 { background: #fef3c7; color: #b45309; }
.rank-2 { background: #f1f5f9; color: #475569; }
.rank-3 { background: #fef2ee; color: #c2410c; }
.rank-n { background: var(--bg); color: var(--muted); }
.bar-h-wrap { display: flex; flex-direction: column; gap: 6px; }
.bar-h-row { display: flex; align-items: center; gap: 8px; }
.bar-h-label { font-size: 12px; color: var(--muted); font-family: var(--font-mono); width: 52px; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-h-track { flex: 1; height: 16px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.bar-h-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
.bar-h-val { font-size: 11px; font-family: var(--font-mono); color: var(--muted); width: 28px; }
.species-legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
.species-legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); font-family: var(--font-mono); }
.swatch { width: 10px; height: 10px; border-radius: 2px; }
.section-pad { padding: 0 1.5rem 10px; }
#loading-screen { position: fixed; inset: 0; background: var(--water-dark); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; gap: 1rem; }
.loading-title { font-family: 'Playfair Display', serif; font-size: 28px; color: #fff; }
.loading-sub { font-family: 'DM Mono', monospace; font-size: 13px; color: rgba(255,255,255,0.6); }
.spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#error-screen { display: none; padding: 2rem 1.5rem; font-family: monospace; font-size: 13px; }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loading-title">🎣 RHF Dashboard</div>
  <div class="spinner"></div>
  <div class="loading-sub">Loading catch data from Google Sheets...</div>
</div>

<div id="error-screen"></div>

<div id="app" style="display:none">
  <div class="dash-header">
    <div>
      <div class="dash-title">🎣 Rock Hard Fishing Dashboard</div>
      <div class="dash-subtitle">Catch records · All years · All anglers</div>
    </div>
    <div style="text-align:right">
      <div style="font-size:11px;color:rgba(255,255,255,0.5);font-family:'DM Mono',monospace">Total entries</div>
      <div style="font-size:22px;font-family:'Playfair Display',serif;color:#fff" id="hdr-total">—</div>
    </div>
  </div>

  <div class="filter-bar">
    <label>YEAR</label>
    <div class="pill-group" id="year-pills"></div>
    <label style="margin-left:8px">SPECIES</label>
    <div class="pill-group" id="species-pills"></div>
    <label style="margin-left:8px">ANGLER</label>
    <select id="angler-select"><option value="all">All anglers</option></select>
  </div>

  <div class="metrics-row" id="metrics-row"></div>

  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">Catches by angler <span id="by-angler-sub"></span></div>
      <div class="bar-h-wrap" id="angler-bars"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Species breakdown <span id="species-sub"></span></div>
      <div class="species-legend" id="species-legend"></div>
      <div style="position:relative;height:180px"><canvas id="speciesChart" role="img" aria-label="Species doughnut chart">Species data.</canvas></div>
    </div>
  </div>

  <div class="charts-row-3">
    <div class="chart-card">
      <div class="chart-title">Size distribution <span id="size-sub"></span></div>
      <div class="slider-row">
        <label>Min</label>
        <input type="range" id="min-len" min="0" max="80" value="0" step="1">
        <span class="slider-val" id="min-len-val">0 cm</span>
        <label>Max</label>
        <input type="range" id="max-len" min="0" max="80" value="80" step="1">
        <span class="slider-val" id="max-len-val">80 cm</span>
      </div>
      <div style="position:relative;height:180px"><canvas id="histChart" role="img" aria-label="Length histogram">Length data.</canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Year-over-year</div>
      <div style="position:relative;height:210px"><canvas id="yoyChart" role="img" aria-label="Year over year catches">YoY data.</canvas></div>
    </div>
  </div>

  <div class="section-pad">
    <div class="chart-card">
      <div class="chart-title">Biggest fish leaderboard <span id="lb-sub"></span></div>
      <table class="leaderboard" id="leaderboard"></table>
    </div>
  </div>
</div>

<script>
const SHEET_ID = "1xKU5SqtWo9FduA4LDrGJ_RCLtr2zPmj3J7_zUzGSYm0";
const CSV_URL = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/export?format=csv&t=" + Date.now();
const SPECIES_COLORS = { "Walleye": "#1a6b8a", "Pike": "#e8943a", "Bass": "#3a8c5c" };
const SPECIES_NORM = s => (s === "Smallmouth Bass" || s === "Bass") ? "Bass" : s;

let data = [], years = [], species = [], anglers = [];
let selYears = new Set(), selSpecies = new Set(), selAngler = "all";
let minLen = 0, maxLen = 80;
let speciesChart, histChart, yoyChart;

async function loadData() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const lines = text.trim().split("\n").slice(1);
    data = lines.map(line => {
      const cols = line.split(",");
      return { year: parseInt(cols[0]), angler: (cols[1]||"").trim(), species: SPECIES_NORM((cols[2]||"").trim()), length: parseFloat(cols[3]) };
    }).filter(d => d.year && d.angler && d.species && !isNaN(d.length));
    years = [...new Set(data.map(d => d.year))].sort();
    species = [...new Set(data.map(d => d.species))].sort();
    anglers = [...new Set(data.map(d => d.angler))].sort();
    selYears = new Set(years.map(String));
    selSpecies = new Set(species);
    buildAnglerSelect();
    render();
    document.getElementById("loading-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
  } catch(err) {
    document.getElementById("loading-screen").style.display = "none";
    const e = document.getElementById("error-screen");
    e.style.display = "block";
    e.innerHTML = "<strong style='color:#d85a30'>Could not load data.</strong><br><br>Make sure the Google Sheet is shared as 'Anyone with the link' (Viewer).<br><br>Error: " + err.message;
  }
}

function filtered() {
  return data.filter(d => selYears.has(String(d.year)) && selSpecies.has(d.species) && (selAngler === "all" || d.angler === selAngler) && d.length >= minLen && d.length <= maxLen);
}

function buildPills(id, items, selSet, onChange) {
  const c = document.getElementById(id); c.innerHTML = "";
  const ap = document.createElement("div");
  ap.className = "pill" + (selSet.size === items.length ? " active" : "");
  ap.textContent = "All";
  ap.onclick = () => { if (selSet.size === items.length) selSet.clear(); else items.forEach(i => selSet.add(String(i))); onChange(); };
  c.appendChild(ap);
  items.forEach(item => {
    const p = document.createElement("div");
    p.className = "pill" + (selSet.has(String(item)) ? " active" : "");
    p.textContent = item;
    p.onclick = () => { if (selSet.has(String(item))) selSet.delete(String(item)); else selSet.add(String(item)); onChange(); };
    c.appendChild(p);
  });
}

function buildAnglerSelect() {
  const sel = document.getElementById("angler-select");
  sel.innerHTML = '<option value="all">All anglers</option>';
  anglers.forEach(a => { const o = document.createElement("option"); o.value = a; o.textContent = a; sel.appendChild(o); });
  sel.onchange = () => { selAngler = sel.value; render(); };
}

function renderMetrics(f) {
  const biggest = f.length ? Math.max(...f.map(d => d.length)) : 0;
  const avg = f.length ? (f.reduce((s,d) => s+d.length,0)/f.length) : 0;
  document.getElementById("hdr-total").textContent = f.length;
  document.getElementById("metrics-row").innerHTML =
    '<div class="metric-card blue"><div class="metric-label">Total catches</div><div class="metric-value">'+f.length+'</div><div class="metric-sub">filtered</div></div>' +
    '<div class="metric-card amber"><div class="metric-label">Biggest fish</div><div class="metric-value">'+biggest+' cm</div><div class="metric-sub">personal best</div></div>' +
    '<div class="metric-card green"><div class="metric-label">Avg length</div><div class="metric-value">'+avg.toFixed(1)+' cm</div><div class="metric-sub">filtered</div></div>' +
    '<div class="metric-card coral"><div class="metric-label">Anglers</div><div class="metric-value">'+new Set(f.map(d=>d.angler)).size+'</div><div class="metric-sub">unique</div></div>';
}

function renderAnglerBars(f) {
  const counts = {}, spMap = {};
  f.forEach(d => { counts[d.angler]=(counts[d.angler]||0)+1; if(!spMap[d.angler])spMap[d.angler]={}; spMap[d.angler][d.species]=(spMap[d.angler][d.species]||0)+1; });
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const max = sorted[0]?sorted[0][1]:1;
  document.getElementById("by-angler-sub").textContent = "top "+sorted.length;
  document.getElementById("angler-bars").innerHTML = sorted.map(([name,cnt]) => {
    const top = Object.entries(spMap[name]||{}).sort((a,b)=>b[1]-a[1])[0];
    const col = top?(SPECIES_COLORS[top[0]]||"#888"):"#888";
    return '<div class="bar-h-row"><div class="bar-h-label" title="'+name+'">'+name+'</div><div class="bar-h-track"><div class="bar-h-fill" style="width:'+Math.round(cnt/max*100)+'%;background:'+col+'"></div></div><div class="bar-h-val">'+cnt+'</div></div>';
  }).join("");
}

function renderSpeciesChart(f) {
  const counts = {};
  f.forEach(d => { counts[d.species]=(counts[d.species]||0)+1; });
  const labels=Object.keys(counts), vals=labels.map(l=>counts[l]), colors=labels.map(l=>SPECIES_COLORS[l]||"#888");
  const total=vals.reduce((a,b)=>a+b,0);
  document.getElementById("species-legend").innerHTML = labels.map((l,i)=>'<div class="species-legend-item"><div class="swatch" style="background:'+colors[i]+'"></div>'+l+' ('+Math.round(counts[l]/total*100)+'%)</div>').join("");
  document.getElementById("species-sub").textContent = labels.length+" species";
  if(speciesChart)speciesChart.destroy();
  speciesChart = new Chart(document.getElementById("speciesChart"),{type:"doughnut",data:{labels,datasets:[{data:vals,backgroundColor:colors,borderWidth:2,borderColor:"#fff"}]},options:{responsive:true,maintainAspectRatio:false,cutout:"65%",plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>" "+ctx.label+": "+ctx.raw+" ("+Math.round(ctx.raw/total*100)+"%)"}}}}}); 
}

function renderHist(f) {
  const bins=[];
  for(let i=0;i<=75;i+=5)bins.push({lo:i,hi:i+5,count:0});
  f.forEach(d=>{const b=bins.find(b=>d.length>=b.lo&&d.length<b.hi);if(b)b.count++;});
  document.getElementById("size-sub").textContent=minLen+"–"+maxLen+" cm";
  if(histChart)histChart.destroy();
  histChart=new Chart(document.getElementById("histChart"),{type:"bar",data:{labels:bins.map(b=>b.lo+"–"+b.hi),datasets:[{data:bins.map(b=>b.count),backgroundColor:"#1a6b8a",borderRadius:3,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:10,family:"'DM Mono'"},color:"#9ca3af",autoSkip:false,maxRotation:45}},y:{grid:{color:"rgba(0,0,0,0.05)"},ticks:{font:{size:10},color:"#9ca3af"}}}}});
}

function renderYoY() {
  const counts={};
  years.forEach(y=>counts[y]=0);
  data.filter(d=>selSpecies.has(d.species)&&(selAngler==="all"||d.angler===selAngler)).forEach(d=>{counts[d.year]=(counts[d.year]||0)+1;});
  if(yoyChart)yoyChart.destroy();
  yoyChart=new Chart(document.getElementById("yoyChart"),{type:"bar",data:{labels:years,datasets:[{data:years.map(y=>counts[y]),backgroundColor:years.map(y=>selYears.has(String(y))?"#1a6b8a":"#b0cdd8"),borderRadius:4,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:12,family:"'DM Mono'"},color:"#9ca3af"}},y:{grid:{color:"rgba(0,0,0,0.05)"},ticks:{font:{size:11},color:"#9ca3af"}}}}});
}

function renderLeaderboard(f) {
  const best={};
  f.forEach(d=>{if(!best[d.angler]||d.length>best[d.angler].length)best[d.angler]=d;});
  const sorted=Object.entries(best).sort((a,b)=>b[1].length-a[1].length).slice(0,8);
  document.getElementById("lb-sub").textContent="top "+sorted.length+" by single catch";
  document.getElementById("leaderboard").innerHTML="<thead><tr><th>#</th><th>Angler</th><th>Species</th><th>Length</th><th>Year</th></tr></thead><tbody>"+
    sorted.map(([angler,rec],i)=>{
      const rc=i===0?"rank-1":i===1?"rank-2":i===2?"rank-3":"rank-n";
      const col=SPECIES_COLORS[rec.species]||"#888";
      return '<tr><td><span class="rank-badge '+rc+'">'+(i+1)+'</span></td><td style="font-weight:500;color:var(--text)">'+angler+'</td><td><span style="font-size:11px;padding:2px 8px;border-radius:10px;background:'+col+'22;color:'+col+';font-family:var(--font-mono)">'+rec.species+'</span></td><td style="font-family:var(--font-mono);font-weight:500;color:#1a6b8a">'+rec.length+' cm</td><td style="color:var(--muted);font-family:var(--font-mono)">'+rec.year+'</td></tr>';
    }).join("")+"</tbody>";
}

function render() {
  buildPills("year-pills",years,selYears,render);
  buildPills("species-pills",species,selSpecies,render);
  const f=filtered();
  renderMetrics(f); renderAnglerBars(f); renderSpeciesChart(f); renderHist(f); renderYoY(); renderLeaderboard(f);
}

document.getElementById("min-len").oninput=function(){minLen=+this.value;if(minLen>maxLen){maxLen=minLen;document.getElementById("max-len").value=maxLen;}document.getElementById("min-len-val").textContent=minLen+" cm";render();};
document.getElementById("max-len").oninput=function(){maxLen=+this.value;if(maxLen<minLen){minLen=maxLen;document.getElementById("min-len").value=minLen;}document.getElementById("max-len-val").textContent=maxLen+" cm";render();};

loadData();
</script>
</body>
</html>
